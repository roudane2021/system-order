spring:
  application:
    name: infra-order
  profiles:
    active: oracle
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:9101}
      label: main
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 3000
        max-interval: 10000
        multiplier: 1.5


logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%t] %X{className}::%X{methodName} - %msg%n"
